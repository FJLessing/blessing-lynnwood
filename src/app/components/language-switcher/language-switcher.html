<!-- Language Toggle -->
<div class="inline-flex items-stretch bg-sage-50 rounded-full p-1">
  <button
    (click)="switchLanguage('en')"
    class="flex items-center justify-center rounded-full py-3 text-base leading-none text-white transition-colors duration-300"
    [class.bg-primary]="currentLanguage === 'en'"
    [class.px-6]="currentLanguage === 'en'"
    [class.px-4]="currentLanguage !== 'en'"
  >
    English
  </button>
  <button
    (click)="switchLanguage('af')"
    class="flex items-center justify-center rounded-full py-3 text-base leading-none text-white transition-colors duration-300"
    [class.bg-primary]="currentLanguage === 'af'"
    [class.px-6]="currentLanguage === 'af'"
    [class.px-4]="currentLanguage !== 'af'"
  >
    Afrikaans
  </button>
</div>
